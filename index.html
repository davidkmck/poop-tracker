<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poop Tracker</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #fbbf24; --dim: #64748b; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; overflow-x: hidden; }
        h1 { color: var(--accent); font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin: 20px 0; }
        
        .entry-box { background: var(--card); padding: 30px; border-radius: 24px; text-align: center; width: 100%; max-width: 340px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box; }
        .counter-btn { background: var(--accent); color: var(--bg); border: none; width: 80px; height: 80px; border-radius: 50%; font-size: 2rem; font-weight: bold; cursor: pointer; margin: 20px 0; transition: transform 0.1s; }
        .counter-btn:active { transform: scale(0.9); }
        .count-display { font-size: 3rem; font-weight: bold; margin-bottom: 5px; }
        
        .calendar-container { width: 100%; max-width: 340px; margin-top: 30px; background: var(--card); padding: 15px; border-radius: 20px; box-sizing: border-box; touch-action: pan-y; }
        .calendar-header { display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
        #monthLabel { font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: var(--text); font-size: 0.9rem; }
        
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-label { font-size: 0.7rem; color: var(--dim); text-align: center; margin-bottom: 5px; }
        .day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.8rem; border-radius: 8px; background: rgba(255,255,255,0.03); position: relative; }
        .day.today { border: 1px solid var(--accent); }
        .day-num { font-size: 0.6rem; color: var(--dim); position: absolute; top: 4px; left: 4px; }
        .score-val { font-weight: bold; font-size: 0.9rem; color: var(--accent); }
    </style>
</head>
<body>

    <h1>Poop Tracker</h1>

    <div class="entry-box">
        <div class="count-display" id="countDisplay">0</div>
        <div style="color: var(--dim); font-size: 0.8rem; text-transform: uppercase;">Times Today</div>
        <button class="counter-btn" onclick="increment()">+</button>
        <div style="font-size: 0.7rem; color: var(--dim); cursor: pointer;" onclick="decrement()">Oops, remove one</div>
    </div>

    <div class="calendar-container" id="swipeArea">
        <div class="calendar-header">
            <span id="monthLabel">MONTH YEAR</span>
        </div>
        <div class="grid" id="calendarGrid"></div>
    </div>

    <script>
        const getDateKey = (date = new Date()) => date.toLocaleDateString('en-CA');
        const display = document.getElementById('countDisplay');
        const monthLabel = document.getElementById('monthLabel');
        
        let poopHistory = JSON.parse(localStorage.getItem('poopHistory')) || {};
        let currentViewDate = new Date();
        const todayKey = getDateKey();

        function increment() {
            poopHistory[todayKey] = (poopHistory[todayKey] || 0) + 1;
            saveAndRefresh();
        }

        function decrement() {
            if (poopHistory[todayKey] > 0) {
                poopHistory[todayKey] -= 1;
                saveAndRefresh();
            }
        }

        function saveAndRefresh() {
            localStorage.setItem('poopHistory', JSON.stringify(poopHistory));
            display.innerText = poopHistory[todayKey] || 0;
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            ['S','M','T','W','T','F','S'].forEach(day => {
                const div = document.createElement('div');
                div.className = 'day-label';
                div.innerText = day;
                grid.appendChild(div);
            });

            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            monthLabel.innerText = currentViewDate.toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

            for (let d = 1; d <= daysInMonth; d++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day';
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const count = poopHistory[dateStr];

                if (dateStr === todayKey) dayDiv.classList.add('today');
                if (count > 0) {
                    // Slight opacity increase based on count
                    dayDiv.style.background = `rgba(251, 191, 36, ${Math.min(count * 0.15, 0.6)})`;
                    dayDiv.innerHTML = `<span class="day-num">${d}</span><span class="score-val">${count}</span>`;
                } else {
                    dayDiv.innerHTML = `<span class="day-num">${d}</span>`;
                }
                grid.appendChild(dayDiv);
            }
        }

        // Swipe Logic
        let touchstartX = 0;
        let touchendX = 0;
        const swipeArea = document.getElementById('swipeArea');

        swipeArea.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, {passive: true});
        swipeArea.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            if (touchendX < touchstartX - 50) {
                currentViewDate.setMonth(currentViewDate.getMonth() + 1);
                renderCalendar();
            }
            if (touchendX > touchstartX + 50) {
                currentViewDate.setMonth(currentViewDate.getMonth() - 1);
                renderCalendar();
            }
        }

        // Init
        display.innerText = poopHistory[todayKey] || 0;
        renderCalendar();
    </script>
</body>
</html>
